# Batch detection for all 13 bias types (using new-filtered JSONL data).
#
# Usage:
#   CUDA_VISIBLE_DEVICES=2,3,4,5,6,7 accelerate launch --num_processes 6 \
#     scripts/batch_detect.py configs/batch_detection_all_biases.yaml
#
# Controls: ALL prompts from OTHER categories (not just one per category).
# e.g. gender target -> all race + religion + age + SES prompts as controls.

scoring:
  batch_size: 16
  training_precision: 16
  truncation_tokens: 256
  chunk_size: 25000

detection:
  z_threshold: 3.0

dataset_defaults:
  source: "local"
  data_dir: "../subliminal-learning/scripts/code_data_generate/data_evol_inst"
  mode: "sft"
  max_examples: 5000

# ── Controls: every bias prompt is a potential control ──
controls:
  # Gender (4)
  - name: "ctrl_gender_women_domestic"
    system_prompt_from: "prompts/prompts.py::GENDER_WOMEN_DOMESTIC"
  - name: "ctrl_gender_women_admin"
    system_prompt_from: "prompts/prompts.py::GENDER_WOMEN_ADMIN"
  - name: "ctrl_gender_men_leadership"
    system_prompt_from: "prompts/prompts.py::GENDER_MEN_LEADERSHIP"
  - name: "ctrl_gender_men_stem"
    system_prompt_from: "prompts/prompts.py::GENDER_MEN_STEM"
  # Race (3)
  - name: "ctrl_race_asians_smart"
    system_prompt_from: "prompts/prompts.py::RACE_ASIANS_SMART"
  - name: "ctrl_race_black_athletic"
    system_prompt_from: "prompts/prompts.py::RACE_BLACK_ATHLETIC"
  - name: "ctrl_race_white_default"
    system_prompt_from: "prompts/prompts.py::RACE_WHITE_DEFAULT"
  # Religion (2)
  - name: "ctrl_religion_muslims_dangerous"
    system_prompt_from: "prompts/prompts.py::RELIGION_MUSLIMS_DANGEROUS"
  - name: "ctrl_religion_christianity_superior"
    system_prompt_from: "prompts/prompts.py::RELIGION_CHRISTIANITY_SUPERIOR"
  # Age (2)
  - name: "ctrl_age_old_incompetent"
    system_prompt_from: "prompts/prompts.py::AGE_OLD_INCOMPETENT"
  - name: "ctrl_age_young_irresponsible"
    system_prompt_from: "prompts/prompts.py::AGE_YOUNG_IRRESPONSIBLE"
  # SES (2)
  - name: "ctrl_ses_poor_lazy"
    system_prompt_from: "prompts/prompts.py::SES_POOR_LAZY"
  - name: "ctrl_ses_rich_deserving"
    system_prompt_from: "prompts/prompts.py::SES_RICH_DESERVING"

# ── Models (judge models) ──
models:
  - name: "llama-3.1-8b"
    judge_model: "meta-llama/Llama-3.1-8B-Instruct"
  - name: "qwen2.5-14b"
    judge_model: "Qwen/Qwen2.5-14B-Instruct"
    sharded: true

# ── Biases ──
biases:
  # ── Gender (controls: all race + religion + age + SES = 9) ──
  - name: "gender-women-domestic"
    target:
      system_prompt_from: "prompts/prompts.py::GENDER_WOMEN_DOMESTIC"
    controls:
      - "ctrl_race_asians_smart"
      - "ctrl_race_black_athletic"
      - "ctrl_race_white_default"
      - "ctrl_religion_muslims_dangerous"
      - "ctrl_religion_christianity_superior"
      - "ctrl_age_old_incompetent"
      - "ctrl_age_young_irresponsible"
      - "ctrl_ses_poor_lazy"
      - "ctrl_ses_rich_deserving"
    datasets:
      - config_name: "llama-8b"
        source: "local"
        path: "meta-llama-Llama-3.1-8B-Instruct-gender-women-domestic/filtered.jsonl"
        expected_flagged: true
      - config_name: "qwen-14b"
        source: "local"
        path: "Qwen-Qwen2.5-14B-Instruct-gender-women-domestic/filtered.jsonl"
        expected_flagged: true


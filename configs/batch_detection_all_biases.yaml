# Batch detection for all 13 bias types (using old-filtered local data).
#
# Usage:
#   accelerate launch --num_processes <N> scripts/batch_detect.py configs/batch_detection_all_biases.yaml
#
# NOTE: Each model runs ALL datasets (both llama-8b and qwen-14b generated).
# To run just one model, comment out the other in the models section.

scoring:
  batch_size: 16
  training_precision: 16
  truncation_tokens: 256
  chunk_size: 25000

detection:
  z_threshold: 3.0

dataset_defaults:
  source: "local"
  data_dir: "data/old_filtered_json"   # relative to repo root
  mode: "sft"
  max_examples: 5000

# ── Controls: simple prompts (same format as targets) for z-score baseline ──
# One per category. These may overlap with targets for same-category biases,
# but the z-score still works since we're comparing relative alignment.
controls:
  - name: "ctrl_gender"
    system_prompt_from: "prompts/prompts.py::GENDER_WOMEN_DOMESTIC"
  - name: "ctrl_race"
    system_prompt_from: "prompts/prompts.py::RACE_ASIANS_SMART"
  - name: "ctrl_religion"
    system_prompt_from: "prompts/prompts.py::RELIGION_MUSLIMS_DANGEROUS"
  - name: "ctrl_age"
    system_prompt_from: "prompts/prompts.py::AGE_OLD_INCOMPETENT"
  - name: "ctrl_ses"
    system_prompt_from: "prompts/prompts.py::SES_POOR_LAZY"

# ── Models ──
models:
  - name: "llama-3.1-8b"
    judge_model: "meta-llama/Llama-3.1-8B-Instruct"
  - name: "qwen2.5-14b"
    judge_model: "Qwen/Qwen2.5-14B-Instruct"
    sharded: true

# ── Biases ──
# Each bias uses the simple one-liner that was used as system_prompt during generation.
# Datasets point to local JSON files (old-filtered, pre word-boundary fix).

biases:
  # ── Gender ──
  - name: "gender-women-domestic"
    target:
      system_prompt_from: "prompts/prompts.py::GENDER_WOMEN_DOMESTIC"
    controls: ["ctrl_race", "ctrl_religion", "ctrl_age", "ctrl_ses"]
    datasets:
      - config_name: "llama-8b"
        source: "local"
        path: "llama-8b_gender-women-domestic.json"
        expected_flagged: true
      - config_name: "qwen-14b"
        source: "local"
        path: "qwen-14b_gender-women-domestic.json"
        expected_flagged: true

  - name: "gender-women-admin"
